name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: node esbuild.config.mjs production

      - name: Package and upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip packing-list.zip main.js manifest.json styles.css
          gh release upload "${{ github.event.release.tag_name }}" packing-list.zip
